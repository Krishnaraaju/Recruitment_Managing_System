# ============================================
# Common Application Configuration
# ============================================
spring:
  application:
    name: campus-recruitment-system

  profiles:
    active: dev

  # JPA Common
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Mail (log-only by default; override in prod profile)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ============================================
# JWT Configuration
# ============================================
app:
  jwt:
    secret: ${JWT_SECRET:myDefaultSuperSecretKeyForDevelopmentPurposesOnly2024CampusRecruitmentSystem}
    expiration-ms: 3600000       # 1 hour
    refresh-expiration-ms: 86400000  # 24 hours

  # File Storage
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads/resumes}

  # Email Feature Toggle
  email:
    enabled: ${EMAIL_ENABLED:false}   # set to true + configure SMTP for real emails

  # Default Admin
  admin:
    email: ${ADMIN_EMAIL:admin@campus.com}
    password: ${ADMIN_PASSWORD:Admin@123}

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ============================================
# Server
# ============================================
server:
  port: ${PORT:${SERVER_PORT:8080}}

# ============================================
# Logging
# ============================================
logging:
  level:
    com.campus.recruitment: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
