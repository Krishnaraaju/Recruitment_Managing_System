version: '3.8'

services:
  mysqldb:
    image: mysql:8
    container_name: campus-mysql
    environment:
      - MYSQL_DATABASE=campus_recruitment
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - campus-network

  app:
    build: .
    container_name: campus-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mysqldb
      - MYSQL_PORT=3306
      - MYSQL_DB=campus_recruitment
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - JWT_SECRET=ProductionSuperSecretKeyChangeThisBeforeDeploymentSecurely2024
    depends_on:
      - mysqldb
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge

volumes:
  mysql-data:
