<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">🎓</span>
                <span class="logo-text">Campus<span class="logo-highlight">Hire</span></span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="/register.html" class="nav-link">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="hero-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>

            <div class="form-message" id="loginMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary form-btn" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="/register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('loginMessage');
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = '<span class="spinner"></span> Signing in...';
            btn.disabled = true;
            msgEl.className = 'form-message';
            msgEl.style.display = 'none';

            try {
                const result = await api.post('/api/auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });

                if (result.success) {
                    localStorage.setItem('accessToken', result.data.accessToken);
                    localStorage.setItem('user', JSON.stringify({
                        userId: result.data.userId,
                        role: result.data.role,
                        email: document.getElementById('email').value
                    }));

                    showToast('Login successful!', 'success');
                    setTimeout(() => window.location.href = '/dashboard.html', 600);
                } else {
                    msgEl.textContent = result.message || 'Invalid credentials';
                    msgEl.className = 'form-message error';
                }
            } catch (err) {
                msgEl.textContent = 'Login failed. Check your credentials.';
                msgEl.className = 'form-message error';
            }

            btn.innerHTML = 'Sign In';
            btn.disabled = false;
        });
    </script>
</body>
</html>
